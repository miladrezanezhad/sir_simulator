[flake8]
max-line-length = 88
extend-ignore = E203, W503
exclude = .git, __pycache__, .venv, build, dist, src/sir_simulator.egg-info

[coverage:run]
source = src/sir_simulator
omit = tests/*, src/sir_simulator/user_interface/app.py

[coverage:report]
exclude_lines =
    pragma: no cover
    if __name__ == .__main__.:
    raise AssertionError
    raise NotImplementedError
