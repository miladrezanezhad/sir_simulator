name: Run Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10']  # حذف 3.11 فعلاً
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy scipy pandas matplotlib networkx scikit-learn
        if [ -f requirements_full.txt ]; then pip install -r requirements_full.txt; fi
    
    - name: Run tests
      run: |
        python run_all_tests.py
        python -m unittest discover tests/security